version: '3'

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    restart: unless-stopped
    ports:
      # DNS ports - bound to localhost only for local filtering
      - "127.0.0.1:53:53/tcp"
      - "127.0.0.1:53:53/udp"
      # Admin web interface
      - "127.0.0.1:80:80/tcp"
    volumes:
      - ./data/work:/opt/adguardhome/work
      - ./data/conf:/opt/adguardhome/conf
    environment:
      - TZ=America/Los_Angeles
